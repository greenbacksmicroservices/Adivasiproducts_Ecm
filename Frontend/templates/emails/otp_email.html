<!doctype html>
<html>
  <body style="margin:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8fb;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:22px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:0 18px 44px rgba(15,23,42,0.08);">
            <tr>
              <td style="padding:26px 28px;background:linear-gradient(135deg,#0f766e,#16a34a);color:#ffffff;">
                <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Lexvers Security</div>
                <h1 style="margin:10px 0 0;font-size:26px;line-height:1.2;">{{ title }}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 28px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.55;color:#334155;">{{ summary }}</p>
                <div style="margin:22px 0;padding:22px;border-radius:18px;background:#ecfdf5;border:1px solid #bbf7d0;text-align:center;">
                  <div style="font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#15803d;font-weight:800;">Your OTP</div>
                  <div style="margin-top:8px;font-size:38px;letter-spacing:10px;font-weight:900;color:#064e3b;">{{ otp }}</div>
                </div>
                <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#475569;">This OTP expires in {{ expiry_minutes }} minutes. For your safety, do not share it with anyone.</p>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#64748b;">If you did not request this, please ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#f8fafc;color:#64748b;font-size:12px;text-align:center;">
                Greenbacks Lexvers Pvt. Ltd.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
