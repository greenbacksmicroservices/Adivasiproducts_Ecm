<header class="seller-topbar">
  <div class="seller-topbar-left">
    <button type="button" class="seller-icon-btn" aria-label="Toggle sidebar" aria-pressed="false" data-seller-sidebar-toggle>
      <i class="fas fa-bars"></i>
    </button>
    <div>
      <h1 id="seller-page-title">{{ seller_page_title|default:'Dashboard' }}</h1>
      <p class="seller-topbar-sub">{{ seller_store_label|default:'Seller workspace' }}</p>
    </div>
  </div>

  <div class="seller-topbar-actions">
    <div class="seller-notification-menu" data-seller-notification-menu-wrap>
      <button
        type="button"
        class="seller-icon-btn seller-bell-btn"
        aria-label="Open notifications"
        aria-expanded="false"
        data-seller-notification-menu
        data-seller-notification-endpoint="{% url 'seller-order-notifications' %}"
      >
        <i class="fas fa-bell"></i>
        <span class="seller-notification-badge" data-seller-notification-badge {% if not seller_unread_notifications_count %}hidden{% endif %}>{{ seller_unread_notifications_count }}</span>
      </button>
      <div class="seller-notification-dropdown" role="menu">
        <div class="seller-notification-head">
          <h2>Notifications</h2>
          <span data-seller-notification-count {% if not seller_unread_notifications_count %}hidden{% endif %}>{{ seller_unread_notifications_count }} new</span>
        </div>
        <div class="seller-notification-list" data-seller-notification-list>
          {% for notification in seller_header_notifications %}
            <button
              type="button"
              class="seller-notification-item"
              data-seller-notification-id="{{ notification.pk }}"
              data-seller-notification-url="{% url 'seller-order-detail' notification.order.order_number %}"
              data-seller-section-jump="orders"
              data-title="Orders"
            >
              <i class="fas fa-circle-info"></i>
              <span>
                <b>{{ notification.title }}</b>
                <small>{{ notification.message|default:notification.order.order_number|truncatechars:70 }}</small>
                <em>{{ notification.created_at|date:'d M, h:i A' }}</em>
              </span>
            </button>
          {% empty %}
            <p class="seller-notification-empty">No new notifications</p>
          {% endfor %}
        </div>
        <div class="seller-notification-footer">
          <button type="button" data-seller-notification-read-all>Read all</button>
        </div>
      </div>
    </div>

    <button type="button" class="seller-icon-btn" aria-label="Toggle dark mode" aria-pressed="false" data-seller-theme-toggle>
      <i class="fas fa-moon"></i>
    </button>

    <div class="seller-header-menu" data-seller-header-menu-wrap>
      <button type="button" class="seller-menu-trigger" aria-label="Open seller menu" aria-expanded="false" data-seller-header-menu>
        <span class="seller-menu-avatar" data-seller-avatar>
          <img
            src="{% if seller_avatar_url %}{{ seller_avatar_url }}{% endif %}"
            alt="{{ seller_display_name|default:'Seller' }}"
            data-seller-avatar-img
            onerror="this.hidden=true; this.nextElementSibling.hidden=false;"
            {% if not seller_avatar_url %}hidden{% endif %}
          >
          <b data-seller-avatar-initial {% if seller_avatar_url %}hidden{% endif %}>{{ seller_avatar_initial|default:'S' }}</b>
        </span>
        <i class="fas fa-chevron-down"></i>
      </button>
      <div class="seller-header-dropdown" role="menu">
        <button type="button" class="seller-menu-item" data-seller-section-jump="store-settings" data-title="Store Settings">
          <i class="fas fa-user-gear"></i> Account Settings
        </button>
        <a href="{% url 'home' %}" class="seller-menu-item">
          <i class="fas fa-store"></i> Go to Store
        </a>
        <a href="{% url 'logout' %}" class="seller-menu-item danger">
          <i class="fas fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </div>
  </div>
</header>
