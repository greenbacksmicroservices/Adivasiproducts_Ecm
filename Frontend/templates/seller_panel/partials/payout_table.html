<table>
  <thead>
    <tr>
      <th>Payout ID</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Payment method</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    {% for payout in payout_rows %}
      <tr>
        <td>{{ payout.id }}</td>
        <td>{{ payout.amount }}</td>
        <td>{{ payout.date }}</td>
        <td>{{ payout.method }}</td>
        <td>{{ payout.status }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No payout history yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
