{% if field %}
  <label class="seller-form-field {% if full %}full{% endif %} {% if field.field.widget.input_type == 'checkbox' %}seller-check-row{% endif %}">
    <span>{{ field.label }}{% if field.field.required %}<b class="required-star">*</b>{% endif %}</span>
    {{ field }}
    {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
    {{ field.errors }}
  </label>
{% endif %}
