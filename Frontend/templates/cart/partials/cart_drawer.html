<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <h3><a href="{% url 'my-cart' %}" class="cart-head-link">Your Cart</a></h3>
    <button type="button" id="close-cart-btn" aria-label="Close cart"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="cart-body" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-total-row cart-subtotal-row">
      <span>Subtotal</span>
      <strong id="cart-subtotal-value">Rs. 0.00</strong>
    </div>
    <div class="cart-total-row cart-delivery-row">
      <span>Delivery</span>
      <strong id="cart-delivery-value">Rs. 0.00</strong>
    </div>
    <div class="cart-total-row">
      <span>Total</span>
      <strong id="cart-total-value">Rs. 0.00</strong>
    </div>
    <div class="cart-foot-actions">
      <a href="{% url 'my-cart' %}" class="cart-page-btn">Open My Cart</a>
      <button type="button" id="clear-cart-btn" class="clear-cart-btn">Clear Cart</button>
    </div>
  </div>
</aside>
<div class="cart-toast" id="cart-toast"></div>
